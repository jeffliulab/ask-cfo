  # ============================================================
  # 会计准则（CAS）
  # ============================================================
  - id: cas-14-revenue-five-step
    category: CAS
    source_name: 《企业会计准则第 14 号——收入》（2017 修订）
    source_url: http://kjs.mof.gov.cn/zhuantilanmu/kuaijizhuanze/201707/t20170710_2643148.htm
    chapter: 第二章 收入的确认
    article_number: 第四条 ~ 第十四条
    title: 收入确认五步法
    summary: 企业应当在履行了合同中的履约义务（即客户取得相关商品控制权时）确认收入。识别合同 → 识别履约义务 → 确定交易价格 → 分摊交易价格 → 履行履约义务时确认收入。
    full_text: |
      企业应当在履行了合同中的履约义务，即在客户取得相关商品控制权时确认收入。

      五步法（CAS-14 修订重点，对标 IFRS 15）：
      1. 识别与客户订立的合同
      2. 识别合同中的履约义务（一项可明确区分的商品或服务）
      3. 确定交易价格（含可变对价、合同中存在的重大融资成分等）
      4. 将交易价格分摊至各单项履约义务
      5. 履行各单项履约义务时确认收入

      履约义务在某一时段内履行的：按履约进度确认收入；
      履约义务在某一时点履行的：通常以客户取得控制权的时点确认收入。

      实务示例：
      - 销售货物：发出商品 + 客户验收 → 时点确认（控制权转移）
      - 长期建造合同：按完工百分比 → 时段确认
      - 软件 SaaS 订阅：按使用期间均匀确认
    tags:
      - 会计准则
      - CAS-14
      - 收入
      - 五步法
      - 履约义务
      - 控制权
      - IFRS-15

  - id: cas-4-fixed-asset-depreciation
    category: CAS
    source_name: 《企业会计准则第 4 号——固定资产》第十五条 / 第十七条 + 《企业所得税法实施条例》第六十条
    source_url: http://kjs.mof.gov.cn/zhuantilanmu/kuaijizhuanze/200806/t20080602_46214.htm
    chapter: 第四章 后续计量
    article_number: 第十五 ~ 第十九条
    title: 固定资产折旧方法 + 最低折旧年限
    summary: 企业应当根据固定资产的性质和使用情况合理确定折旧方法（年限平均法 / 工作量法 / 双倍余额递减法 / 年数总和法）。税法最低折旧年限：房屋 20 年 / 飞机火车轮船机器机械 10 年 / 电子设备 3 年 / 与生产经营活动有关的器具工具家具等 5 年 / 其他运输工具 4 年。
    full_text: |
      企业应当对所有固定资产计提折旧。但是，已提足折旧仍继续使用的固定资产和单独计价入账的土地除外。

      可选用的折旧方法：
      - 年限平均法（直线法）：年折旧 = (原值 - 预计净残值) / 折旧年限
      - 工作量法：单位工作量折旧 = (原值 - 预计净残值) / 预计总工作量
      - 双倍余额递减法（加速折旧前两年）
      - 年数总和法（加速折旧）

      税法最低折旧年限（《企业所得税法实施条例》第六十条）：
      - 房屋、建筑物：20 年
      - 飞机、火车、轮船、机器、机械和其他生产设备：10 年
      - 与生产经营活动有关的器具、工具、家具等：5 年
      - 飞机、火车、轮船以外的运输工具：4 年
      - 电子设备：3 年

      会计折旧年限可以短于税法最低，但税前扣除以税法为准（产生税会差异）。

      加速折旧（财税〔2014〕75 号、财税〔2018〕54 号）：
      - 单价 ≤500 万元的固定资产，可一次性税前扣除（不分摊）
      - 高新技术企业 / 制造业等行业可缩短折旧年限或采用加速折旧
