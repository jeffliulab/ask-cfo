  # ============================================================
  # 个人所得税（IIT）
  # ============================================================
  - id: iit-comprehensive-threshold-60k
    category: IIT
    source_name: 《中华人民共和国个人所得税法》第六条
    source_url: https://www.gov.cn/zhengce/2018-08/31/content_5318756.htm
    chapter: 第二章 应纳税所得额
    article_number: 第六条
    title: 综合所得 6 万元基本减除费用
    summary: 居民个人取得综合所得（工资薪金 / 劳务报酬 / 稿酬 / 特许权使用费）以每一纳税年度的收入额减除费用六万元（每月 5000 元）以及专项扣除、专项附加扣除和依法确定的其他扣除后的余额，为应纳税所得额。
    full_text: |
      居民个人的综合所得，以每一纳税年度的收入额减除费用六万元以及专项扣除、专项附加扣除和依法确定的其他扣除后的余额，为应纳税所得额。

      综合所得 = 工资薪金 + 劳务报酬 × 80% + 稿酬 × 80% × 70% + 特许权使用费 × 80%

      实务理解：
      1. 月度预扣预缴用累计预扣法（年内累计收入 - 累计减除 - 累计专扣 - 累计专项附加 - 累计其他）× 预扣率 - 累计已预扣
      2. 年度汇算清缴：3 月 1 日至 6 月 30 日，多退少补
      3. 居民个人 vs 非居民个人：非居民按月或按次单独计税，不享受 6 万年度减除
    tags:
      - 个人所得税
      - 综合所得
      - 减除费用
      - 6 万
      - "5000"
      - 累计预扣
      - 汇算清缴

  - id: iit-special-additional-deduction-2018
    category: IIT
    source_name: 《个人所得税专项附加扣除暂行办法》（国发〔2018〕41 号）
    source_url: https://www.gov.cn/zhengce/content/2018-12/22/content_5351181.htm
    chapter: 全文
    article_number: 第二条 ~ 第二十六条
    title: 6 项专项附加扣除
    summary: 子女教育（每子女每月 2000 元）/ 继续教育（学历教育每月 400 元、技能证书一次性 3600 元）/ 大病医疗（自负 ≥1.5 万部分，限 8 万）/ 住房贷款利息（首套每月 1000 元）/ 住房租金（一线 1500 / 部分二线 1100 / 其他 800）/ 赡养老人（独生子女每月 3000 / 非独 ≤1500）。
    full_text: |
      ▸ 子女教育：每个子女每月 2000 元（年满 3 岁至全日制学历教育，含学前 / 义务 / 高中 / 高等）。
        2023 年起：每子女每月由 1000 元提至 2000 元（财税〔2023〕13 号）。
      ▸ 继续教育：
        - 学历教育每月 400 元，最长 48 个月
        - 技能 / 专业资格证书取得当年一次性 3600 元
      ▸ 大病医疗：
        - 自负医药费 ≥1.5 万元的部分，年度限额 8 万元
        - 在年度汇算清缴时扣除
      ▸ 住房贷款利息：
        - 首套住房贷款利息每月 1000 元，最长 240 个月
        - 不与住房租金同时扣除
      ▸ 住房租金：
        - 直辖市 / 省会 / 计划单列市每月 1500 元
        - 其他人口超 100 万市每月 1100 元
        - 其他地区每月 800 元
      ▸ 赡养老人：
        - 独生子女每月 3000 元（2023 年起从 2000 提至 3000）
        - 非独生子女由兄弟姐妹分摊每人不超过 1500 元
        - 被赡养人需 60 周岁以上

      另：3 岁以下婴幼儿照护（财税〔2022〕7 号）每子女每月 1000 元（2023 年起 2000 元）。
    tags:
      - 个人所得税
      - 专项附加扣除
      - 子女教育
