  # ============================================================
  # 增值税（VAT）
  # ============================================================
  - id: vat-no-deduction-2008
    category: VAT
    source_name: 《中华人民共和国增值税暂行条例》第十条
    source_url: https://www.gov.cn/zhengce/2017-12-19/content_5248608.htm
    chapter: 第二章 税率
    article_number: 第十条
    title: 不得从销项税额中抵扣的进项税额
    summary: 用于简易计税方法计税项目、免征增值税项目、集体福利或者个人消费的购进货物、劳务、服务、无形资产和不动产的进项税额不得从销项税额中抵扣；交际应酬消费、非正常损失等共 8 类情形。
    full_text: |
      下列项目的进项税额不得从销项税额中抵扣：
      （一）用于简易计税方法计税项目、免征增值税项目、集体福利或者个人消费的购进货物、劳务、服务、无形资产和不动产；
      （二）非正常损失的购进货物，以及相关的劳务和交通运输服务；
      （三）非正常损失的在产品、产成品所耗用的购进货物（不包括固定资产）、劳务和交通运输服务；
      （四）国务院规定的其他项目。

      实务理解：
      1. 纳税人的交际应酬消费属于个人消费，相关进项税额一律不得抵扣（餐饮发票最常见）
      2. 集体福利包括职工食堂、职工宿舍等，对应进项不得抵扣
      3. "非正常损失"指因管理不善造成被盗、丢失、霉烂变质、违法被没收等
    tags:
      - 增值税
      - 进项税
      - 抵扣
      - 不得抵扣
      - 餐饮
      - 招待费
      - 集体福利

  - id: vat-small-scale-1pct-2023
    category: VAT
    source_name: 财政部 税务总局公告 2023 年第 1 号
    source_url: https://www.gov.cn/zhengce/zhengceku/2023-01/09/content_5735848.htm
    chapter: 全文
    article_number: 第一条 / 第二条
    title: 小规模纳税人 3% 减按 1% 优惠政策
    summary: 自 2023-01-01 至 2027-12-31，月销售额 10 万元以下（含）的小规模纳税人免征增值税；适用 3% 征收率的应税销售收入减按 1% 征收。
    full_text: |
      为支持小微企业和个体工商户发展，现将增值税小规模纳税人减免增值税等政策公告如下：
      一、自 2023 年 1 月 1 日至 2027 年 12 月 31 日，对月销售额 10 万元以下（含本数）的增值税小规模纳税人，免征增值税。
      二、自 2023 年 1 月 1 日至 2027 年 12 月 31 日，增值税小规模纳税人适用 3% 征收率的应税销售收入，减按 1% 征收率征收增值税；适用 3% 预征率的预缴增值税项目，减按 1% 预征率预缴增值税。

      实务理解：
      - 月销售额 10 万 / 季 30 万 起征点，未达免征
      - 超过起征点但适用 3% 征收率的，全部销售额按 1% 征收（不是只对超过部分）
    tags:
      - 增值税
      - 小规模纳税人
      - 减免
      - 1%
      - 优惠政策
      - 起征点

  - id: vat-rd-input-addback-2023
    category: VAT
    source_name: 财政部 税务总局公告 2023 年第 7 号（增值税加计抵减）
    source_url: https://www.gov.cn/zhengce/zhengceku/2023-03/27/content_5748618.htm
    chapter: 全文
    article_number: 第一条
    title: 集成电路 / 工业母机 / 先进制造业增值税加计抵减
    summary: 集成电路企业当期可抵扣进项税额加计 15% 抵减应纳税额；工业母机企业 15%；先进制造业 5%。期间 2023-01-01 至 2027-12-31。
    full_text: |
      一、允许集成电路企业当期可抵扣进项税额加计 15% 抵减应纳增值税税额（"加计抵减政策"）。
      二、加计抵减政策按月或者按季计算，纳税人未及时计提加计抵减额的，可以补提。
      三、纳税人计提的加计抵减额按以下公式确定：
          当期计提加计抵减额 = 当期可抵扣进项税额 × 加计抵减率
          当期可抵减加计抵减额 = 上期末加计抵减额余额 + 当期计提加计抵减额 - 当期调减加计抵减额
      四、纳税人应单独核算加计抵减额的计提、抵减、调减、结余等变动情况。
    tags:
      - 增值税
      - 加计抵减
      - 制造业
      - 集成电路
      - 工业母机
      - 先进制造业

  # ============================================================
  # 企业所得税（CIT）
  # ============================================================
  - id: cit-entertainment-deduction-limit
    category: CIT
    source_name: 《中华人民共和国企业所得税法实施条例》第四十三条
    source_url: https://www.gov.cn/zhengce/2020-12/26/content_5573447.htm
    chapter: 第三章 应纳税所得额
    article_number: 第四十三条
    title: 业务招待费税前扣除限额
    summary: 企业发生的与生产经营活动有关的业务招待费支出，按照发生额的 60% 扣除，但最高不得超过当年销售（营业）收入的 5‰。
    full_text: |
      企业发生的与生产经营活动有关的业务招待费支出，按照发生额的 60% 扣除，但最高不得超过当年销售（营业）收入的 5‰。

      实务理解：
      1. 取两者孰低：发生额 × 60%   vs   营业收入 × 0.5%
      2. 销售（营业）收入 = 主营业务收入 + 其他业务收入 + 视同销售收入；不含投资收益、营业外收入
      3. 超标部分调增应纳税所得额（永久性差异，不可结转后期）
      4. 个体工商户业主自身发生的招待费支出不允许税前扣除

      示例：A 公司当年营业收入 1000 万，发生业务招待费 10 万。
      - 发生额 × 60% = 6 万
      - 营业收入 × 0.5% = 5 万
      - 取低者：可扣 5 万；调增应纳税所得额 5 万
    tags:
      - 企业所得税
      - 业务招待费
      - 税前扣除
      - 限额
      - 60%
      - 5‰
      - 招待费

  - id: cit-rd-superdeduction-100pct-2023
    category: CIT
    source_name: 财政部 税务总局公告 2023 年第 7 号（研发费用加计扣除）
    source_url: https://www.gov.cn/zhengce/zhengceku/2023-03/27/content_5748622.htm
    chapter: 全文
    article_number: 第一条 / 第二条
    title: 研发费用 100% 加计扣除（普惠政策）
    summary: 自 2023-01-01 起，企业研发活动中实际发生的研发费用，未形成无形资产计入当期损益的，在按规定据实扣除的基础上，再按照实际发生额的 100% 加计扣除；形成无形资产的按 200% 摊销。
    full_text: |
      一、企业开展研发活动中实际发生的研发费用，未形成无形资产计入当期损益的，在按规定据实扣除的基础上，自 2023 年 1 月 1 日起，再按照实际发生额的 100% 在税前加计扣除；形成无形资产的，自 2023 年 1 月 1 日起，按照无形资产成本的 200% 在税前摊销。
      二、企业预缴申报当年第三季度（按季预缴）或 9 月份（按月预缴）企业所得税时，可以自行选择就当年前三季度研发费用享受加计扣除优惠。

      实务理解：
      1. 该政策不再区分行业（原制造业 / 科技型中小企业），全行业普惠
      2. 加计扣除部分仅作税务调整，不在会计账上反映（"税会差异"，纳税调减）
      3. 研发费用范围按 财税〔2015〕119 号 规定（人员人工 / 直接投入 / 折旧 / 无形资产摊销 / 新产品设计费 / 其他相关）
      4. 研发活动定义：为获得新的科学与技术（不包括人文、社会科学）新知识，创造性运用，实质性改进
    tags:
      - 企业所得税
      - 研发费用
      - 加计扣除
      - 100%
      - R&D
      - 三新

  - id: cit-advertising-deduction-15pct
    category: CIT
    source_name: 《中华人民共和国企业所得税法实施条例》第四十四条
    source_url: https://www.gov.cn/zhengce/2020-12/26/content_5573447.htm
    chapter: 第三章 应纳税所得额
    article_number: 第四十四条
    title: 广告费和业务宣传费税前扣除限额
    summary: 不超过当年销售（营业）收入 15% 的部分准予扣除；超过部分准予以后纳税年度结转。化妆品 / 医药 / 饮料（不含酒类）特殊行业按 30%。
    full_text: |
      企业发生的符合条件的广告费和业务宣传费支出，除国务院财政、税务主管部门另有规定外，不超过当年销售（营业）收入 15% 的部分，准予扣除；超过部分，准予在以后纳税年度结转扣除。

      特殊行业（财税〔2017〕41 号）：化妆品制造或销售、医药制造、饮料制造（不含酒类制造）按 30% 扣除。
      烟草企业（《企业所得税法实施条例》第四十四条另规）：烟草广告宣传费支出一律不得在计算应纳税所得额时扣除。

      实务理解：
      1. 与业务招待费区别：广告费可结转，招待费不可
      2. 关联企业之间分摊：可在签订分摊协议下，由其中一方扣除或部分由另一方扣除
    tags:
      - 企业所得税
      - 广告费
      - 业务宣传费
